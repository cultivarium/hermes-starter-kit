version: "1.0.0"
title: "Connect a new MCP server"
description: >
  An interactive walkthrough that helps the user add an MCP (Model
  Context Protocol) server to their Goose install. The agent helps
  them find a server, configure it in config.yaml, store any
  credentials in the OS keyring via `goose configure`, and verify it
  loads.

prompt: |
  Help the user connect a new MCP server to Goose. Walk through the
  steps below rather than dumping a finished config block — the goal
  is to understand the moving parts, not just paste a stanza.

  An MCP server is a process that exposes tools/resources over the
  Model Context Protocol. Goose calls it as an "extension" in
  config.yaml. There are three transport types:

    - **stdio**: Goose spawns a local subprocess. Most common; what
      official `@modelcontextprotocol/server-*` packages use.
    - **sse / streamable-http**: Remote server reachable over HTTP.
      Used for hosted MCPs (e.g. some vendor offerings).
    - **builtin**: Bundled inside Goose itself (developer, memory,
      computercontroller).

  Walk the user through these steps, confirming at each one:

  1. **Decide what the server should do.** Ask the user what data or
     tool they want to give the agent access to. Examples: read a
     specific Postgres database, search internal Notion pages, run
     blast queries against a local sequence database, etc.

  2. **Find a server.** For common cases, point them at:

       - <https://github.com/modelcontextprotocol/servers> for the
         official catalog (`@modelcontextprotocol/server-*`).
       - <https://www.npmjs.com/search?q=mcp-server> for vendor /
         community packages.
       - <https://goose-docs.ai/docs/mcp/> for Goose-tested servers.

     If the user already has a specific package in mind, skip ahead.

  3. **Check the auth model.** Read the server's README and tell the
     user, in plain language: does it need an API key, an OAuth flow,
     a token, or nothing at all? What env vars does it expect? Stop
     and confirm the user has the credentials before moving on.

  4. **Add the extension stanza** to Goose's config.yaml under
     `extensions:`. The file lives at:

       - macOS / Linux: `~/.config/goose/config.yaml`
       - Windows: `%APPDATA%\Block\goose\config\config.yaml`
         (typically `C:\Users\<you>\AppData\Roaming\Block\goose\config\config.yaml`)

     Use the developer extension's file tools to make the edit. The
     shape:

         <name>:
           type: stdio
           cmd: "npx"                      # or python, uvx, /usr/local/bin/foo, ...
           args: ["-y", "<package-name>"]  # any other args the server needs
           env_keys: ["FOO_TOKEN"]         # names of env vars Goose resolves from
                                           # the OS keyring (populated via `goose
                                           # configure`). Preferred path for secrets.
           envs: {}                        # literal env-var values passed straight
                                           # to the subprocess. Use only when keyring
                                           # isn't working — values land in plaintext
                                           # in config.yaml.

     Pick a sensible top-level name — usually the service name
     (postgres, sentry, etc.) — and confirm it doesn't collide with an
     existing entry.

  5. **Store secrets in the OS keyring** with `goose configure`.
     This is the preferred path: tokens stay out of config.yaml.
     Walk the user through running `goose configure`, picking the new
     extension, and pasting the value when prompted. After they finish,
     restart Goose and run the verify step.

  6. **Verify the server loads.** In a fresh Goose session, ask the
     user to run a prompt that exercises the server (you can suggest
     one based on what the server does). If the server fails, common
     fixes:

       - the package name is wrong or unpublished — check `npm view
         <pkg>`
       - the binary isn't on PATH — use an absolute `cmd:`
       - server reports the env var is missing even after `goose
         configure` — the keyring lookup is silently failing. Re-run
         `goose configure` first; if that doesn't take, fall back to
         inlining the value via `envs:` (see the next bullet).
       - server crashes on startup — run `npx -y <pkg>` in a terminal
         to see its stderr

     **Keyring-fallback fix.** If `env_keys` lookup keeps failing,
     replace `env_keys: ["FOO_TOKEN"]` with `envs: { FOO_TOKEN: "<value>" }`
     in the stanza. This bypasses the keyring entirely. Tell the user
     plainly: their token is now stored in plaintext in config.yaml,
     so they should treat that file like a secret — chmod 600 it,
     don't commit it, and rotate the token if the file leaks. This
     isn't the recommended path, but it's a tested unblock when
     keyring resolution is broken on the user's machine.

  7. **Wrap up.** Tell the user where their new extension lives in
     config.yaml, how to disable it (`enabled: false` or remove the
     stanza), and confirm that the starter-kit installer will not
     touch user-added extensions on `update.sh` (only extensions
     listed in manifest.yaml's `owned_keys` are managed).

  Important constraints:

  - **Prefer keyring (`env_keys` + `goose configure`) for secrets.**
    Only fall back to inline `envs:` values when the keyring path is
    demonstrably failing — and when you do, tell the user clearly that
    their token is now plaintext in config.yaml so they can manage
    that risk themselves.
  - If the user asks about an MCP server you don't recognize, don't
    invent its config — read the package's README first (web fetch
    is fine) and quote what you find.
  - If the user wants to add one of the connectors the starter kit
    already manages (gdrive, slack, notion), tell them to
    re-run the installer and pick it there — that path is
    update-safe.

activities:
  - "Find an MCP server for the task"
  - "Add the extension stanza to config.yaml"
  - "Store credentials via `goose configure`"
  - "Verify it loads"
