# Manual fallback for promoting `stable` to a tag commit.
#
# Steady-state, the `promote-stable` job in release-please.yml does
# this automatically when a Release PR is merged. This workflow exists
# only for manual recovery — e.g., if the inline job didn't run, or
# someone wants to re-point stable at an older tag.
#
# Note: a `push: tags` trigger does NOT work here because tags pushed
# by GITHUB_TOKEN (which is what release-please-action uses) do not
# trigger downstream workflows. That's why this is workflow_dispatch
# only.

name: promote-stable

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to promote stable to (e.g. v0.3.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fast-forward stable to tag
        env:
          TAG_NAME: ${{ inputs.tag }}
        run: |
          if ! git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "ERROR: tag ${TAG_NAME} does not exist" >&2
            exit 1
          fi
          SHA=$(git rev-list -n 1 "refs/tags/${TAG_NAME}")
          echo "Promoting stable to ${TAG_NAME} (${SHA})"
          git push origin "${SHA}:refs/heads/stable"
